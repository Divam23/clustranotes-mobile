name: clustranotes_mobile
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  timeago: ^3.7.0
  pdf: ^3.13.0
  path_provider: ^2.1.6
  image_picker: ^1.2.2
  multi_image_picker_view: ^3.0.0
  printing: ^5.15.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true
    
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
    - assets/dummy/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf

        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500

        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
